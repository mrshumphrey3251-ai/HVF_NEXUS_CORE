<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HVF NEXUS | STRESS TEST V7.8</title>
    
    <style>
        html, body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; width: 100vw; height: 100vh; user-select: none; }
        body { box-sizing: border-box; background: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000 100%); display: flex; flex-direction: column; transition: background 0.4s; }
        body.alarm-active { background: #2b0000; }

        /* ALARM BANNER */
        #global-alarm { display: none; position: fixed; top: 0; width: 100%; background: #ff0000; color: #fff; text-align: center; padding: 10px; font-weight: 900; z-index: 9000; letter-spacing: 5px; font-size: 0.7rem; animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* OVERLAYS */
        .live-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 5000; display: none; flex-direction: column; padding: 40px 25px; box-sizing: border-box; }
        .visual-box { width: 100%; height: 40%; background: #050505; border: 1px solid #222; margin: 20px 0; position: relative; overflow: hidden; }
        
        /* SLIDERS */
        .slider-box { margin-top: 30px; border-top: 1px solid #222; padding-top: 20px; }
        .control-slider { -webkit-appearance: none; width: 100%; height: 10px; background: #222; border-radius: 5px; outline: none; margin: 20px 0; }
        .control-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 30px; height: 30px; background: #ffaa00; border-radius: 50%; cursor: pointer; }

        /* DASH & DOCK */
        .view-panel { flex: 1; padding: 30px 25px 100px 25px; display: none; }
        .view-panel.active { display: block; }
        .data-block { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 25px; border-radius: 2px; margin-bottom: 20px; cursor: pointer; }
        .hero-val { font-size: 2.5rem; font-weight: 900; }
        .command-dock { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: #0a0a0a; border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: #444; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 900; flex: 1; text-align: center; }
        .nav-item.active { color: #ffaa00; }
    </style>
</head>
<body>

    <div id="global-alarm">CRITICAL SYSTEM BREACH // 1AHA8</div>

    <div id="view-lake-live" class="live-overlay">
        <div style="font-size: 1.2rem; font-weight: 800; letter-spacing: 5px;">BASIN OVERRIDE</div>
        <div class="visual-box" id="lake-visual-box">
            <div id="lake-water" style="position:absolute; bottom:0; width:100%; background:rgba(0,170,255,0.2); border-top:2px solid #00aaff; transition: height 0.3s;"></div>
            <div id="lake-depth-text" style="position:absolute; top:20px; left:20px; font-weight:900;">16.40 FT</div>
        </div>
        <div class="slider-box">
            <span style="font-size:0.7rem; letter-spacing:2px; color:#888;">CALIBRATE DEPTH</span>
            <input type="range" min="10" max="25" step="0.1" value="16.4" class="control-slider" id="lake-slider" oninput="adjustLake(this.value)">
        </div>
        <button onclick="closeOverlays()" style="background:#fff; border:none; padding:15px; width:100%; font-weight:900; margin-top:20px;">LOCK CALIBRATION</button>
    </div>

    <div id="view-dash" class="view-panel active">
        <div style="text-transform:uppercase; letter-spacing:8px; font-size:1.5rem; font-weight:800; margin-bottom:30px;">Nexus Command</div>
        <div class="data-block" onclick="openLake()">
            <span style="font-size:0.7rem; color:#666; letter-spacing:3px;">Basin Displacement</span>
            <div class="hero-val" id="dash-lake">16.40<span style="font-size:1rem; color:#ffaa00;"> FT</span></div>
        </div>
        <div class="data-block" onclick="alert('Grid Stress Test Coming Next...')">
            <span style="font-size:0.7rem; color:#666; letter-spacing:3px;">Core Saturation</span>
            <div class="hero-val">82.00<span style="font-size:1rem; color:#ffaa00;"> %</span></div>
        </div>
    </div>

    <div class="command-dock">
        <div class="nav-item active">Dash</div>
        <div class="nav-item">Map</div>
        <div class="nav-item">Clinic</div>
        <div class="nav-item">Home</div>
        <div class="nav-item">Intel</div>
    </div>

    <script>
        function openLake() { document.getElementById('view-lake-live').style.display = 'flex'; }
        function closeOverlays() { document.querySelectorAll('.live-overlay').forEach(o => o.style.display = 'none'); }

        function adjustLake(val) {
            document.getElementById('lake-depth-text').innerText = val + " FT";
            document.getElementById('dash-lake').innerHTML = val + '<span style="font-size:1rem; color:#ffaa00;"> FT</span>';
            document.getElementById('lake-water').style.height = (val / 25 * 100) + "%";
            
            const alarm = document.getElementById('global-alarm');
            const visual = document.getElementById('lake-visual-box');
            
            if(val > 23.5) {
                document.body.classList.add('alarm-active');
                alarm.style.display = 'block';
                visual.style.borderColor = '#ff0000';
            } else {
                document.body.classList.remove('alarm-active');
                alarm.style.display = 'none';
                visual.style.borderColor = '#222';
            }
        }
    </script>
</body>
</html>
