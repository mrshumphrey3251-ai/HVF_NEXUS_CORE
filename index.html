<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HVF NEXUS | ATMOSPHERIC COMMAND V8.2</title>
    
    <style>
        html, body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; width: 100vw; height: 100vh; user-select: none; }
        body { box-sizing: border-box; background: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000 100%); display: flex; flex-direction: column; transition: background 0.4s; }
        body.alarm-active { background: #2b0000; }

        #global-alarm { display: none; position: fixed; top: 0; width: 100%; background: #ff0000; color: #fff; text-align: center; padding: 10px; font-weight: 900; z-index: 9000; letter-spacing: 5px; font-size: 0.7rem; animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* STATUS INDICATORS */
        .status-light { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; }
        .light-green { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .light-yellow { background: #ffff00; box-shadow: 0 0 10px #ffff00; }
        .light-red { background: #ff0000; box-shadow: 0 0 10px #ff0000; }

        /* DASHBOARD GRID */
        .view-panel { flex: 1; padding: 25px 20px 100px 20px; overflow-y: auto; }
        .data-block { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 20px; border-radius: 2px; margin-bottom: 15px; cursor: pointer; }
        .hero-val { font-size: 2.2rem; font-weight: 900; line-height: 1; }
        .tag { font-size: 0.6rem; color: #666; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 8px; }

        /* DOCK */
        .command-dock { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: #0a0a0a; border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: #444; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 900; flex: 1; text-align: center; }
        .nav-item.active { color: #ffaa00; }
    </style>
</head>
<body>

    <div id="global-alarm">CRITICAL SYSTEM BREACH // 1AHA8</div>

    <div id="view-dash" class="view-panel" style="display:block;">
        <div style="text-transform:uppercase; letter-spacing:6px; font-size:1.2rem; font-weight:800; margin-bottom:20px;">Nexus Dashboard</div>
        
        <div class="data-block">
            <div style="display:flex; align-items:center; margin-bottom:10px;">
                <div class="status-light light-green"></div>
                <span class="tag">Meteorological Intel // OK-071</span>
            </div>
            <div style="display:flex; justify-content: space-between; align-items: flex-end;">
                <div class="hero-val">74<span style="font-size:1rem; color:#ffaa00;">°F</span></div>
                <div style="font-size: 0.8rem; font-weight: 800; color: #888;">WIND: 12 MPH</div>
            </div>
        </div>

        <div class="data-block">
            <div style="display:flex; align-items:center; margin-bottom:10px;">
                <div class="status-light light-green"></div>
                <span class="tag">Basin Displacement</span>
            </div>
            <div class="hero-val">16.40<span style="font-size:1rem; color:#ffaa00;"> FT</span></div>
        </div>

        <div class="data-block">
            <div style="display:flex; align-items:center; margin-bottom:10px;">
                <div class="status-light light-green"></div>
                <span class="tag">Core Saturation</span>
            </div>
            <div class="hero-val">82.00<span style="font-size:1rem; color:#ffaa00;"> %</span></div>
        </div>
    </div>

    <div class="command-dock">
        <div class="nav-item active">Dash</div>
        <div class="nav-item">Map</div>
        <div class="nav-item">Clinic</div>
        <div class="nav-item">Home</div>
        <div class="nav-item">Intel</div>
    </div>

</body>
</html>
