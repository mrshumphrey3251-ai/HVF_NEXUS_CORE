<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HVF NEXUS | TITAN SOVEREIGN</title>
    
    <style>
        /* TITAN OBSIDIAN PALETTE */
        html, body {
            margin: 0; padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            overflow: hidden; width: 100vw; height: 100vh;
            user-select: none;
        }

        body { 
            box-sizing: border-box; 
            background: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000000 100%);
            padding: 30px;
        }

        /* LAYER 1: THE COMMAND DECK */
        #main-dashboard {
            position: relative;
            z-index: 1;
        }

        .header-section { margin-bottom: 40px; }
        .brand-title { 
            text-transform: uppercase; letter-spacing: 10px; color: #ffffff; 
            margin: 0; font-size: 1.8rem; font-weight: 800;
        }
        .brand-status { 
            font-size: 0.8rem; color: #ffaa00; margin-top: 10px; 
            text-transform: uppercase; letter-spacing: 4px; font-weight: 600;
        }

        .grid-container { display: flex; flex-direction: column; gap: 30px; }

        /* THE TITAN MODULE */
        .module { 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px; border-radius: 4px;
            cursor: pointer;
        }

        .label { 
            font-size: 0.9rem; color: #888; text-transform: uppercase; 
            letter-spacing: 5px; margin-bottom: 15px; display: block; font-weight: 700;
        }

        .digital-value { 
            font-size: 4rem; font-weight: 900; color: #ffffff; 
            line-height: 1; display: block; letter-spacing: -2px;
        }
        .unit { font-size: 1.2rem; color: #ffaa00; margin-left: 10px; letter-spacing: 3px; vertical-align: middle; }

        .titan-bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); margin-top: 25px; position: relative; }
        .titan-bar-fill { height: 100%; width: 65%; background: #ffffff; box-shadow: 0 0 25px rgba(255,255,255,0.5); transition: width 1.2s ease; }

        /* THE TITAN VAULT OVERLAY */
        #vault-panel { 
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; 
            background: #000; z-index: 100; 
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1); 
            padding: 50px 30px; box-sizing: border-box; 
        }
        #vault-panel.active { transform: translateY(0); }

        .exit-btn {
            font-size: 1rem; color: #ffaa00; text-transform: uppercase; 
            letter-spacing: 5px; font-weight: 800; cursor: pointer;
            margin-bottom: 50px; display: inline-block; border-bottom: 2px solid #ffaa00;
        }

        .data-block { margin-bottom: 50px; }
        .data-tag { font-size: 0.9rem; color: #555; text-transform: uppercase; letter-spacing: 6px; display: block; margin-bottom: 10px; font-weight: 700; }
        .data-hero { font-size: 3rem; font-weight: 900; color: #ffffff; letter-spacing: 2px; line-height: 1; }

        .master-btn { 
            display: block; width: 100%; padding: 30px; 
            background: #ffffff; color: #000; 
            text-align: center; text-transform: uppercase; 
            letter-spacing: 8px; font-size: 1.2rem;
            font-weight: 900; border: none; margin-top: 20px;
        }

        .footer { text-align: center; margin-top: 40px; font-size: 0.7rem; color: #333; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div id="main-dashboard">
        <div class="header-section">
            <h1 class="brand-title">NEXUS COMMAND</h1>
            <div class="brand-status">CEO STRATEGIC OVERRIDE // 1AHA8</div>
        </div>

        <div class="grid-container">
            <div class="module" onclick="updateMetric('lake-bar', 'lake-val', 25, 'FT')">
                <span class="label">Basin Displacement</span>
                <span class="digital-value" id="lake-val">16.40<span class="unit">FT</span></span>
                <div class="titan-bar-bg"><div id="lake-bar" class="titan-bar-fill" style="width: 65%;"></div></div>
            </div>

            <div class="module" onclick="updateMetric('power-bar', 'power-val', 100, '%')">
                <span class="label">Core Saturation</span>
                <span class="digital-value" id="power-val">82.00<span class="unit">%</span></span>
                <div class="titan-bar-bg"><div id="power-bar" class="titan-bar-fill" style="width: 82%;"></div></div>
            </div>

            <button class="master-btn" onclick="toggleVault(true)">DECRYPT VAULT</button>
        </div>

        <div class="footer">HUMPHREY VIRTUAL FARMS LLC // SOVEREIGN STATUS</div>
    </div>

    <div id="vault-panel">
        <div class="exit-btn" onclick="toggleVault(false)">← BACK TO COMMAND</div>
        
        <div class="data-block">
            <span class="data-tag">CAGE CODE</span>
            <span class="data-hero">1AHA8</span>
        </div>

        <div class="data-block">
            <span class="data-tag">Sovereign UEI</span>
            <span class="data-hero">S1M4ENLHTDH5</span>
        </div>

        <div class="data-block">
            <span class="data-tag">Unit Allocation</span>
            <span class="data-hero">200 RES</span>
            <div style="color: #ffaa00; font-size: 0.9rem; margin-top: 10px; letter-spacing: 4px; font-weight: 700;">JOHNSTON COUNTY OK</div>
        </div>

        <div class="data-block">
            <span class="data-tag">Security State</span>
            <span class="data-hero" style="color: #444;">SILENCE</span>
        </div>
    </div>

    <script>
        function toggleVault(show) {
            const vault = document.getElementById('vault-panel');
            if(show) vault.classList.add('active');
            else vault.classList.remove('active');
        }
        
        function updateMetric(barId, textId, max, unit) {
            const bar = document.getElementById(barId);
            const text = document.getElementById(textId);
            const newVal = (Math.random() * (max - (max*0.6)) + (max*0.6)).toFixed(2);
            bar.style.width = (newVal / max) * 100 + '%';
            text.innerHTML = newVal + '<span class="unit">' + unit + '</span>';
        }
    </script>
</body>
</html>
