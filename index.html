<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HVF NEXUS | SECURE COMMAND</title>
    
    <style>
        html, body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; width: 100vw; height: 100vh; user-select: none; }
        body { box-sizing: border-box; background: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000 100%); display: flex; flex-direction: column; }

        .command-dock { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: rgba(10, 10, 10, 0.98); border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: #444; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 900; text-align: center; cursor: pointer; flex: 1; }
        .nav-item.active { color: #ffaa00; }

        .view-panel { flex: 1; padding: 30px 25px 100px 25px; overflow-y: auto; display: none; }
        .view-panel.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header-title { text-transform: uppercase; letter-spacing: 6px; font-size: 1.2rem; font-weight: 800; margin-bottom: 5px; }
        .header-sub { font-size: 0.65rem; color: #ffaa00; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; }
        .data-block { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 20px; border-radius: 2px; margin-bottom: 20px; position: relative; }
        .tag { font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 3px; display: block; margin-bottom: 10px; }
        .hero-val { font-size: 2rem; font-weight: 900; line-height: 1; }

        /* SECURITY OVERLAY */
        #security-shield { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(0,0,0,0.95); z-index: 5000; 
            display: none; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(15px);
        }
        .key-input { 
            background: transparent; border: none; border-bottom: 2px solid #ffaa00; 
            color: #fff; font-size: 2rem; text-align: center; width: 200px; 
            letter-spacing: 10px; margin-bottom: 20px; outline: none;
        }

        /* TOGGLES */
        .cmd-toggle { position: absolute; right: 20px; top: 20px; width: 50px; height: 25px; background: #222; border: 1px solid #444; border-radius: 15px; }
        .cmd-toggle.on { background: #ffaa00; }
        .locked-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; font-size: 0.5rem; letter-spacing: 2px; color: #ffaa00; font-weight: 900; border-radius: 2px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="security-shield">
        <div style="font-size: 0.7rem; color: #ffaa00; letter-spacing: 5px; margin-bottom: 30px;">AUTHORIZATION REQUIRED // 1AHA8</div>
        <input type="password" id="passkey" class="key-input" maxlength="4" placeholder="••••">
        <button onclick="verifyAccess()" style="background: transparent; color: #fff; border: 1px solid #333; padding: 10px 30px; letter-spacing: 4px; font-size: 0.6rem; text-transform: uppercase;">Verify Identity</button>
    </div>

    <div id="view-dash" class="view-panel active">
        <div class="header-title">Nexus Dash</div>
        <div class="header-sub">Public Infrastructure Insight</div>
        
        <div class="data-block">
            <span class="tag">Basin Displacement</span>
            <div class="hero-val">16.40<span style="font-size:1rem; color:#ffaa00;"> FT</span></div>
            <div class="locked-overlay" onclick="requestAccess()">[ MASTER CONTROL LOCKED ]</div>
        </div>

        <div class="data-block">
            <span class="tag">HelioGrid Saturation</span>
            <div class="hero-val">82.00<span style="font-size:1rem; color:#ffaa00;"> %</span></div>
            <div class="locked-overlay" onclick="requestAccess()">[ GRID CONTROL LOCKED ]</div>
        </div>
    </div>

    <div id="view-map" class="view-panel"><div class="header-title">Tactical Map</div></div>
    <div id="view-clinic" class="view-panel"><div class="header-title">Clinic</div></div>
    <div id="view-home" class="view-panel">
        <div class="header-title">Unit Command</div>
        <div class="data-block">
            <span class="tag">Mass Safe-State</span>
            <div class="hero-val">STANDBY</div>
            <div class="locked-overlay" onclick="requestAccess()">[ DEFENSE CONTROL LOCKED ]</div>
        </div>
    </div>
    <div id="view-intel" class="view-panel"><div class="header-title">Intel</div></div>

    <div class="command-dock">
        <div class="nav-item active" onclick="showView('view-dash', this)">Dash</div>
        <div class="nav-item" onclick="showView('view-map', this)">Map</div>
        <div class="nav-item" onclick="showView('view-clinic', this)">Clinic</div>
        <div class="nav-item" onclick="showView('view-home', this)">Home</div>
        <div class="nav-item" onclick="showView('view-intel', this)">Intel</div>
    </div>

    <script>
        let isAuthorized = false;

        function showView(viewId, el) {
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            el.classList.add('active');
        }

        function requestAccess() {
            document.getElementById('security-shield').style.display = 'flex';
        }

        function verifyAccess() {
            const pin = document.getElementById('passkey').value;
            // SME Default Key: 1840 (The Mining Town Aesthetic Date)
            if(pin === "1840") {
                isAuthorized = true;
                document.getElementById('security-shield').style.display = 'none';
                document.querySelectorAll('.locked-overlay').forEach(o => o.style.display = 'none');
                alert("ACCESS GRANTED: WELCOME CEO");
            } else {
                alert("ACCESS DENIED: INVALID SOVEREIGN KEY");
                document.getElementById('passkey').value = '';
            }
        }
    </script>
</body>
</html>
