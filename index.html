<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HVF NEXUS | INDUSTRIAL COMMAND</title>
    
    <style>
        /* PERIOD-APPROPRIATE CORE */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #0a0908; /* Coal Mine Black */
            color: #d4a373; /* Aged Parchment/Brass */
            font-family: 'Courier New', Courier, monospace; /* Typewriter/Letterpress feel */
            overflow-x: hidden;
            width: 100vw;
        }

        body {
            box-sizing: border-box;
            padding: 20px;
            background-image: url('https://www.transparenttextures.com/patterns/asfalt-dark.png'); /* Gritty texture */
        }

        /* HEADER: FOUNDRY STYLE */
        .header-container {
            text-align: center;
            border: 2px solid #5e503f;
            padding: 15px;
            margin-bottom: 25px;
            background: rgba(43, 36, 28, 0.5);
        }

        .header { 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            color: #f1c40f; /* High-Grade Gold */
            margin: 0;
            font-size: 1.6rem;
            text-shadow: 2px 2px #000;
        }

        .sub-header { 
            font-size: 0.7rem; 
            color: #8e7d66; 
            margin-top: 10px; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .grid-container { display: flex; flex-direction: column; gap: 25px; }

        /* THE INDUSTRIAL MODULE */
        .module { 
            border: 3px solid #5e503f; /* Cast Iron Border */
            background: #1a1612; /* Dark Timber */
            padding: 20px;
            position: relative;
            box-shadow: inset 0 0 15px #000;
        }

        h3 { 
            margin-top: 0; 
            color: #f1c40f; 
            font-size: 1.1rem; 
            text-transform: uppercase;
            border-bottom: 1px solid #5e503f;
            padding-bottom: 10px;
        }

        /* GAUGE 01: THE HYDRAULIC GLASS COLUMN */
        .glass-column-container {
            width: 50px;
            height: 150px;
            border: 4px solid #8d99ae; /* Lead/Iron casing */
            background: #000;
            margin: 10px auto;
            position: relative;
            border-radius: 5px;
        }

        .water-column {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 65.6%; /* 16.4ft / 25ft max */
            background: linear-gradient(to right, #2a6f97, #468faf);
            box-shadow: inset -5px 0 10px rgba(0,0,0,0.5);
        }

        /* GAUGE 02: THE STEAM DIAL (HELIOGRID) */
        .steam-dial {
            width: 120px;
            height: 120px;
            border: 6px solid #b87333; /* Heavy Brass */
            border-radius: 50%;
            margin: 10px auto;
            position: relative;
            background: #e3d5ca; /* Aged Paper Face */
            box-shadow: 0 0 10px #000;
        }

        .needle {
            position: absolute;
            bottom: 50%;
            left: 50%;
            width: 4px;
            height: 45px;
            background: #780000; /* Dark Iron Red */
            transform-origin: bottom center;
            transform: rotate(100deg); /* 82% Load position */
            transition: transform 2s ease-in-out;
            border-radius: 2px;
        }

        .dial-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            background: #333;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .readout-stamp {
            text-align: center;
            font-weight: bold;
            color: #f1c40f;
            font-size: 1.2rem;
            margin-top: 10px;
            text-shadow: 1px 1px #000;
        }

        .map-bg {
            background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png');
            opacity: 0.1;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }

        .footer { 
            text-align: center; 
            margin-top: 40px; 
            font-size: 0.6rem; 
            color: #5e503f; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1 class="header">HVF NEXUS</h1>
        <div class="sub-header">PROPRIETARY INDUSTRIAL TERMINAL | EST. 2026</div>
    </div>

    <div class="grid-container">
        
        <div class="module">
            <div class="map-bg"></div>
            <h3>I. HYDRAULIC RESERVOIR (25-ACRE)</h3>
            <div class="glass-column-container">
                <div class="water-column"></div>
            </div>
            <div class="readout-stamp">16.4 FT</div>
            <p style="text-align: center; font-size: 0.8rem; color: #8e7d66;">CURRENT RETENTION DEPTH</p>
        </div>

        <div class="module">
            <div class="map-bg"></div>
            <h3>II. HELIOGRID POWER LOAD</h3>
            <div class="steam-dial">
                <div class="needle"></div>
                <div class="dial-center"></div>
                <div style="position: absolute; bottom: 20px; width: 100%; text-align: center; color: #333; font-size: 0.6rem; font-weight: bold;">PSI / LOAD</div>
            </div>
            <div class="readout-stamp">82% CAP.</div>
            <p style="text-align: center; font-size: 0.8rem; color: #8e7d66;">SOLAR CORE CONSUMPTION</p>
        </div>

    </div>

    <div class="footer">
        HUMPHREY VIRTUAL FARMS LLC<br>
        JOHNSTON COUNTY SOVEREIGNTY PROJECT
    </div>

</body>
</html>
