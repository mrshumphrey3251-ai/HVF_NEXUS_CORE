<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HVF NEXUS | LIVE BASIN V7.6</title>
    
    <style>
        html, body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; width: 100vw; height: 100vh; user-select: none; }
        body { box-sizing: border-box; background: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000 100%); display: flex; flex-direction: column; }

        .command-dock { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: rgba(10, 10, 10, 0.98); border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: #444; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 900; text-align: center; cursor: pointer; flex: 1; }
        .nav-item.active { color: #ffaa00; }

        .view-panel { flex: 1; padding: 30px 25px 100px 25px; overflow-y: auto; display: none; }
        .view-panel.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header-title { text-transform: uppercase; letter-spacing: 6px; font-size: 1.2rem; font-weight: 800; margin-bottom: 5px; }
        .header-sub { font-size: 0.65rem; color: #ffaa00; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; }
        
        .data-block { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 25px; border-radius: 2px; margin-bottom: 20px; position: relative; cursor: pointer; }
        .tag { font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 3px; display: block; margin-bottom: 10px; }
        .hero-val { font-size: 2.2rem; font-weight: 900; line-height: 1; }

        /* LIVE BASIN OVERLAY */
        #lake-live-view { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: #000; z-index: 5000; display: none; 
            flex-direction: column; padding: 40px 25px; box-sizing: border-box;
        }
        .lake-visual { 
            width: 100%; height: 60%; background: #0a0a0a; border: 1px solid #222; 
            margin: 20px 0; position: relative; overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #001a33 0%, #000 70%);
        }
        .water-wave { 
            position: absolute; bottom: 0; width: 100%; height: 40%; 
            background: rgba(0, 170, 255, 0.1); border-top: 2px solid #00aaff;
            box-shadow: 0 0 30px rgba(0, 170, 255, 0.2);
        }
        .lake-info-overlay { font-size: 0.7rem; color: #fff; letter-spacing: 2px; line-height: 2; }

        .master-btn { background: #fff; color: #000; border: none; padding: 15px 30px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; font-size: 0.7rem; width: 100%; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="lake-live-view">
        <div class="header-title">Live Basin Feed</div>
        <div class="header-sub">Slab Road Reservoir // 25 Acres</div>
        
        <div class="lake-visual">
            <div class="water-wave"></div>
            <div style="position: absolute; top: 20px; left: 20px; color: #00aaff; font-weight: 900; font-size: 0.8rem; letter-spacing: 3px;">16.40 FT // OPTIMAL</div>
        </div>

        <div class="lake-info-overlay">
            <div>SURFACE TEMP: 68°F</div>
            <div>TURBIDITY: LOW</div>
            <div>STRUCTURAL ANCHOR: SECURE</div>
        </div>

        <button class="master-btn" onclick="closeLake()">Return to Command</button>
    </div>

    <div id="view-dash" class="view-panel active">
        <div class="header-title">Nexus Dash</div>
        <div class="header-sub">Infrastructure Monitor</div>
        <div class="data-block" onclick="openLake()">
            <span class="tag">Basin Level [TAP FOR LIVE]</span>
            <div class="hero-val">16.40<span style="font-size:1rem; color:#ffaa00;"> FT</span></div>
        </div>
        <div class="data-block">
            <span class="tag">Grid Saturation</span>
            <div class="hero-val">82.00<span style="font-size:1rem; color:#ffaa00;"> %</span></div>
        </div>
    </div>

    <div id="view-map" class="view-panel"><div class="header-title">Map</div></div>
    <div id="view-clinic" class="view-panel"><div class="header-title">Clinic</div></div>
    <div id="view-home" class="view-panel"><div class="header-title">Home</div></div>
    <div id="view-intel" class="view-panel"><div class="header-title">Intel</div></div>

    <div class="command-dock">
        <div class="nav-item active" onclick="showView('view-dash', this)">Dash</div>
        <div class="nav-item" onclick="showView('view-map', this)">Map</div>
        <div class="nav-item" onclick="showView('view-clinic', this)">Clinic</div>
        <div class="nav-item" onclick="showView('view-home', this)">Home</div>
        <div class="nav-item" onclick="showView('view-intel', this)">Intel</div>
    </div>

    <script>
        function showView(viewId, el) {
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            el.classList.add('active');
        }

        function openLake() { document.getElementById('lake-live-view').style.display = 'flex'; }
        function closeLake() { document.getElementById('lake-live-view').style.display = 'none'; }
    </script>
</body>
</html>
