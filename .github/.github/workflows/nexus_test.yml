name: HVF_Power_On

env:
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on: [workflow_dispatch]

jobs:
  run-logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 1. Operational Handshake
        run: python3 src/livestock/triad_link.py
        
      - name: 2. Financial Revenue Oracle
        run: python3 src/finance/revenue_oracle.py

      - name: 3. Infrastructure Site Monitor
        run: python3 src/infrastructure/site_monitor.py
