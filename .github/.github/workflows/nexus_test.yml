name: HVF_Power_On_Test

env:
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on: [workflow_dispatch]

jobs:
  run-logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Execute Logic
        run: |
          python3 src/livestock/triad_link.py
          python3 src/finance/revenue_oracle.py
